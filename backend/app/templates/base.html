<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sky-Eye 资产挖掘系统{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg width="28" height="28" viewBox="0 0 100 100">
          <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00d4ff"/><stop offset="100%" style="stop-color:#0066ff"/>
          </linearGradient></defs>
          <circle cx="50" cy="50" r="45" fill="none" stroke="url(#g)" stroke-width="4"/>
          <circle cx="50" cy="50" r="3" fill="#00d4ff"/>
          <ellipse cx="50" cy="50" rx="25" ry="10" fill="none" stroke="url(#g)" stroke-width="2" transform="rotate(30 50 50)"/>
          <ellipse cx="50" cy="50" rx="25" ry="10" fill="none" stroke="url(#g)" stroke-width="2" transform="rotate(150 50 50)"/>
        </svg>
        <span class="sidebar-title">Sky-Eye</span>
      </div>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> 仪表盘
          </a>
        </li>
        <li class="nav-item">
          <a href="/assets" class="nav-link {% if request.url.path == '/assets' %}active{% endif %}">
            <i class="bi bi-diagram-3"></i> 资产管理
          </a>
        </li>
        <li class="nav-item">
          <a href="/tasks" class="nav-link {% if request.url.path == '/tasks' %}active{% endif %}">
            <i class="bi bi-list-task"></i> 任务管理
          </a>
        </li>
        <li class="nav-item">
          <a href="/vulns" class="nav-link {% if request.url.path == '/vulns' %}active{% endif %}">
            <i class="bi bi-shield-exclamation"></i> 漏洞管理
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <span class="badge bg-success">运行中</span>
        <small class="text-secondary ms-2">v0.2.0</small>
      </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
      <header class="topbar">
        <button class="btn btn-sm btn-outline-secondary d-md-none" onclick="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <h5 class="mb-0">{% block page_title %}Sky-Eye{% endblock %}</h5>
        <div></div>
      </header>
      <div class="content-body">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
