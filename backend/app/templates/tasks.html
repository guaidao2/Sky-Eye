{% extends "base.html" %}
{% block title %}Sky-Eye 任务管理{% endblock %}
{% block page_title %}<i class="bi bi-list-task me-2"></i>任务管理{% endblock %}

{% block content %}
<!-- 过滤器 + 操作栏 -->
<div class="row g-2 mb-3">
  <div class="col-auto">
    <select class="form-select form-select-sm" id="filterStatus" onchange="renderTasks()">
      <option value="">全部状态</option>
      <option value="pending">等待中</option>
      <option value="running">运行中</option>
      <option value="completed">已完成</option>
      <option value="failed">失败</option>
    </select>
  </div>
  <div class="col-auto">
    <select class="form-select form-select-sm" id="filterType" onchange="renderTasks()">
      <option value="">全部类型</option>
      <option value="recon">全链路扫描</option>
      <option value="vulnscan">漏洞检测</option>
      <option value="fingerprint">指纹识别</option>
    </select>
  </div>
  <div class="col-auto">
    <input type="text" class="form-control form-control-sm" id="filterSearch" placeholder="搜索目标..." oninput="renderTasks()">
  </div>
  <div class="col-auto ms-auto">
    <button class="btn btn-sm btn-primary" onclick="showNewTask()"><i class="bi bi-plus-lg me-1"></i> 新建任务</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="refreshTasks()"><i class="bi bi-arrow-clockwise me-1"></i> 刷新</button>
  </div>
</div>

<!-- 状态概览条 -->
<div class="row g-2 mb-3" id="statusBar" style="display:none;">
  <div class="col-auto"><span class="badge bg-warning" id="stat-running">0 运行中</span></div>
  <div class="col-auto"><span class="badge bg-secondary" id="stat-pending">0 等待中</span></div>
  <div class="col-auto"><span class="badge bg-success" id="stat-done">0 已完成</span></div>
  <div class="col-auto"><span class="badge bg-danger" id="stat-failed">0 失败</span></div>
</div>

<!-- 任务列表 -->
<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-dark table-striped mb-0">
        <thead>
          <tr>
            <th style="width:5%">#</th>
            <th style="width:20%">任务名称</th>
            <th style="width:18%">目标</th>
            <th style="width:7%">模式</th>
            <th style="width:8%">状态</th>
            <th style="width:12%">进度</th>
            <th style="width:15%">结果</th>
            <th style="width:8%">时间</th>
            <th style="width:7%">操作</th>
          </tr>
        </thead>
        <tbody id="taskBody">
          <tr><td colspan="9" class="text-center text-secondary py-4">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 新建任务 Modal -->
<div class="modal fade" id="newTaskModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title"><i class="bi bi-rocket-takeoff me-2"></i>新建扫描任务</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">目标 <span class="text-secondary">(域名或 IP)</span></label>
          <input type="text" class="form-control" id="taskTarget" placeholder="example.com 或 192.168.1.1">
          <div class="form-text text-secondary">支持域名和 IP，系统自动识别</div>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label">任务名称</label>
            <input type="text" class="form-control" id="taskName" placeholder="自动生成">
          </div>
          <div class="col-6">
            <label class="form-label">所属组织</label>
            <select class="form-select" id="taskOrg"><option value="">-- 选择 --</option></select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">扫描模式</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="scanMode" id="modeRecon" value="recon" checked>
              <label class="form-check-label" for="modeRecon"><strong>全链路扫描</strong><br><small class="text-secondary">子域名→IP→端口→指纹→POC→报告</small></label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="scanMode" id="modeVuln" value="vulnscan">
              <label class="form-check-label" for="modeVuln"><strong>漏洞检测</strong><br><small class="text-secondary">指纹+POC+弱口令+未授权</small></label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="createTask()" id="createTaskBtn"><i class="bi bi-play-fill me-1"></i> 启动扫描</button>
      </div>
    </div>
  </div>
</div>

<!-- 任务详情 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailTitle">任务详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allTasks = [];
let refreshTimer = null;
const statusMap = { pending:'等待中', running:'运行中', completed:'已完成', failed:'失败', cancelled:'已取消' };
const badgeMap = { pending:'secondary', running:'warning', completed:'success', failed:'danger', cancelled:'dark' };
const modeMap = { recon:'全链路', vulnscan:'漏扫', fingerprint:'指纹' };

async function fetchTasks() {
  const [t, o] = await Promise.all([fetch('/api/v1/tasks'), fetch('/api/v1/organizations')]);
  allTasks = await t.json();
  const orgs = await o.json();
  const sel = document.getElementById('taskOrg');
  if (sel.options.length <= 1) orgs.forEach(o => { const opt = document.createElement('option'); opt.value = o.id; opt.textContent = o.name; sel.appendChild(opt); });
  renderTasks();
}

function renderTasks() {
  const fs = document.getElementById('filterStatus').value;
  const ft = document.getElementById('filterType').value;
  const fq = document.getElementById('filterSearch').value.toLowerCase();
  let tasks = allTasks.filter(t => {
    if (fs && t.status !== fs) return false;
    if (ft && t.task_type !== ft) return false;
    if (fq && !t.target.toLowerCase().includes(fq) && !t.name.toLowerCase().includes(fq)) return false;
    return true;
  });

  // 统计条
  const counts = {running:0, pending:0, completed:0, failed:0};
  allTasks.forEach(t => { counts[t.status] = (counts[t.status]||0)+1; });
  document.getElementById('stat-running').textContent = counts.running + ' 运行中';
  document.getElementById('stat-pending').textContent = counts.pending + ' 等待中';
  document.getElementById('stat-done').textContent = counts.completed + ' 已完成';
  document.getElementById('stat-failed').textContent = counts.failed + ' 失败';
  document.getElementById('statusBar').style.display = (allTasks.length > 0) ? 'flex' : 'none';

  const tbody = document.getElementById('taskBody');
  if (!tasks.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-secondary py-4"><i class="bi bi-inbox fs-3 d-block mb-2"></i>暂无任务 — 点击右上角"新建任务"开始</td></tr>';
    return;
  }

  tbody.innerHTML = tasks.map((t, i) => {
    const summary = parseSummary(t.result_summary);
    const progressColor = t.status === 'failed' ? '#dc3545' : t.status === 'completed' ? '#28a745' : '#00d4ff';
    const progressAnimated = t.status === 'running' ? 'progress-bar-animated progress-bar-striped' : '';
    return `<tr class="${t.status === 'running' ? 'table-warning bg-opacity-10' : ''}">
      <td><small class="text-secondary">${t.id}</small></td>
      <td><strong>${escHtml(t.name)}</strong></td>
      <td><code>${escHtml(t.target)}</code> <span class="badge bg-secondary">${t.target_type || 'domain'}</span></td>
      <td><span class="badge bg-info text-dark">${modeMap[t.task_type] || t.task_type}</span></td>
      <td><span class="badge bg-${badgeMap[t.status]}">${statusMap[t.status] || t.status}</span></td>
      <td>
        <div class="progress" style="height:6px;min-width:60px;">
          <div class="progress-bar ${progressAnimated}" style="width:${t.progress}%;background:${progressColor};"></div>
        </div>
        <small>${t.progress}% ${summary.phase || ''}</small>
      </td>
      <td><small class="text-secondary">${summary.text || '-'}</small></td>
      <td><small class="text-secondary">${t.created_at ? t.created_at.slice(5,16).replace('T',' ') : '-'}</small></td>
      <td>
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-info btn-sm" onclick="showDetail(${t.id})" title="详情"><i class="bi bi-eye"></i></button>
          ${t.status === 'running' ? `<button class="btn btn-outline-warning btn-sm" onclick="cancelTask(${t.id})" title="取消"><i class="bi bi-stop-fill"></i></button>` : ''}
          ${t.status === 'failed' ? `<button class="btn btn-outline-primary btn-sm" onclick="retryTask(${t.id})" title="重试"><i class="bi bi-arrow-repeat"></i></button>` : ''}
          ${t.status !== 'running' ? `<button class="btn btn-outline-danger btn-sm" onclick="deleteTask(${t.id})" title="删除"><i class="bi bi-trash"></i></button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');

  // 运行中任务时加速刷新
  const hasRunning = allTasks.some(t => t.status === 'running');
  if (hasRunning && (!refreshTimer || refreshTimer > 3000)) {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(fetchTasks, 3000);
  } else if (!hasRunning && refreshTimer && refreshTimer <= 3000) {
    clearInterval(refreshTimer);
    refreshTimer = setInterval(fetchTasks, 10000);
  }
}

function parseSummary(raw) {
  if (!raw) return {text:'', phase:''};
  try {
    const s = typeof raw === 'string' ? JSON.parse(raw) : raw;
    const parts = [];
    if (s.subdomains) parts.push(s.subdomains+'子域');
    if (s.ips) parts.push(s.ips+'IP');
    if (s.ports) parts.push(s.ports+'端口');
    if (s.urls) parts.push(s.urls+'URL');
    if (s.fingerprints) parts.push(s.fingerprints+'指纹');
    if (s.vulns) parts.push(s.vulns+'漏洞');
    return {text: parts.join(' | ') || '-', phase:''};
  } catch(e) { return {text: raw.toString().substring(0,80), phase:''}; }
}

function showNewTask() {
  const modal = new bootstrap.Modal(document.getElementById('newTaskModal'));
  modal.show();
}

async function createTask() {
  const target = document.getElementById('taskTarget').value.trim();
  const orgId = document.getElementById('taskOrg').value;
  const mode = document.querySelector('input[name="scanMode"]:checked').value;
  let name = document.getElementById('taskName').value.trim();
  if (!name) name = (mode === 'vulnscan' ? 'VulnScan: ' : 'Recon: ') + target;

  if (!target || !orgId) return alert('请填写目标和组织');
  const btn = document.getElementById('createTaskBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 启动中...';

  try {
    await fetch('/api/v1/tasks', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ org_id: parseInt(orgId), name, task_type: mode, target })
    });
    bootstrap.Modal.getInstance(document.getElementById('newTaskModal')).hide();
    document.getElementById('taskTarget').value = '';
    document.getElementById('taskName').value = '';
    await fetchTasks();
  } catch(e) { alert('失败: '+e.message); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-play-fill me-1"></i> 启动扫描'; }
}

async function cancelTask(id) {
  if (!confirm('确定要取消任务 #'+id+' 吗？')) return;
  await fetch('/api/v1/tasks/'+id+'/cancel', {method:'PUT'});
  await fetchTasks();
}

async function retryTask(id) {
  if (!confirm('确定重试任务 #'+id+' 吗？')) return;
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  await fetch('/api/v1/tasks', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ org_id: task.org_id, name: task.name+' (重试)', task_type: task.task_type, target: task.target })
  });
  await fetchTasks();
}

async function deleteTask(id) {
  if (!confirm('确定删除任务 #'+id+' 吗？此操作不可恢复。')) return;
  await fetch('/api/v1/tasks/'+id, {method:'DELETE'});
  await fetchTasks();
}

function showDetail(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const summary = parseSummary(task.result_summary);
  document.getElementById('detailTitle').textContent = task.name + ' (#' + task.id + ')';
  document.getElementById('detailBody').innerHTML = `
    <div class="row mb-3">
      <div class="col-6">
        <table class="table table-sm table-dark mb-0">
          <tr><td class="text-secondary">目标</td><td><code>${escHtml(task.target)}</code> <span class="badge bg-secondary">${task.target_type || 'domain'}</span></td></tr>
          <tr><td class="text-secondary">模式</td><td><span class="badge bg-info text-dark">${modeMap[task.task_type] || task.task_type}</span></td></tr>
          <tr><td class="text-secondary">组织ID</td><td>${task.org_id}</td></tr>
          <tr><td class="text-secondary">创建时间</td><td>${task.created_at || '-'}</td></tr>
        </table>
      </div>
      <div class="col-6">
        <table class="table table-sm table-dark mb-0">
          <tr><td class="text-secondary">状态</td><td><span class="badge bg-${badgeMap[task.status]}">${statusMap[task.status]||task.status}</span></td></tr>
          <tr><td class="text-secondary">进度</td><td>${task.progress}%</td></tr>
          <tr><td class="text-secondary">开始时间</td><td>${task.started_at || '-'}</td></tr>
          <tr><td class="text-secondary">完成时间</td><td>${task.completed_at || '-'}</td></tr>
        </table>
      </div>
    </div>
    <h6>扫描结果</h6>
    <pre class="bg-dark text-light p-2 rounded" style="max-height:200px;overflow:auto;">${summary.text || '暂无结果'}</pre>
    ${task.error ? `<h6 class="text-danger mt-2">错误信息</h6><pre class="bg-dark text-danger p-2 rounded" style="max-height:150px;overflow:auto;">${escHtml(task.error)}</pre>` : ''}
    ${task.config ? `<h6 class="mt-2">任务配置</h6><pre class="bg-dark text-light p-2 rounded" style="max-height:100px;overflow:auto;">${escHtml(task.config)}</pre>` : ''}
  `;
  new bootstrap.Modal(document.getElementById('detailModal')).show();
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function refreshTasks() { fetchTasks(); }

fetchTasks();
refreshTimer = setInterval(fetchTasks, 5000);
</script>
{% endblock %}
